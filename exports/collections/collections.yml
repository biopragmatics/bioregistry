    - HGVS (see discussion at [#460](https://github.com/biopragmatics/bioregistry/issues/460))

    - [NUBC](http://www.nubc.org) (National Uniform Billing Committee) - could not
    find information about the terminology or its entries

    - [ICPC](http://www.ph3c.org/) (International Classification of Primary Care)
    _same_

    - [GTIN](https://www.gs1.org/standards/id-keys/gtin) (Global Trade Item Number)
    _same_

    - [MDC](https://www.iso.org/standard/37890.html) (Medical Device Codes) since
