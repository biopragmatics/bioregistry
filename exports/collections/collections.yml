  description: 'The Earth System Sciences (ESS) collection contains terminologies
    (ontologies and vocabularies) for describing Earth System Sciences (e.g., `bodc.cf`,
    `envo`), data and structures (e.g., `prov-o`), physical units (e.g., `time`),
    as well as measurements and observations (e.g., `tib.meth`).


    It was developed by the [BITS project](https://projects.tib.eu/bits/home) (BluePrints
    for the Integration of Terminology Services in Earth System Sciences), which was
    funded by the Deutsche Forschungsgemeinschaft ([project number 508107981](https://gepris.dfg.de/gepris/projekt/508107981),
    July 2023 – June 2026). The ESS collection''s terminologies were firstly chosen
    by the three project partners [TIB – Leibniz Information Centre for Science and
    Technology](https://www.tib.eu/en/), the [German Climate Computing Center (DKRZ)](https://www.dkrz.de/en/dkrz-partner-for-climate-research?set_language=en),
    and the [Senckenberg - Leibniz Institution for Biodiversity and Earth System Research
    (SGN)](https://www.senckenberg.de/en/about-us/senckenberg-society-nature-research/)
    in close cooperation with [NFDI4Earth](https://www.nfdi4earth.de/) and the [Helmholtz
    Metadata Collaboration](https://helmholtz-metadaten.de/).'
