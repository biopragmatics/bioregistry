'0000010':
  contributors:
  - email: cthoyt@gmail.com
    github: cthoyt
    name: Charles Tapley Hoyt
    orcid: 0000-0003-4423-4370
  description: 'The [Global Biodata Coalition](https://globalbiodata.org) released
    a [curated list](https://globalbiodata.org/scientific-activities/global-core-biodata-resources/)
    of 37 life sciences databases in December 2022 that they consider as having significant
    importance (see criteria [here](https://doi.org/10.5281/zenodo.5845116)).


    While it''s not a primary goal of the Bioregistry to cover life science databases
    (other resources like Wikidata and [FAIRsharing](https://fairsharing.org) already
    do an excellent job of this), many notable databases induce one or more semantic
    spaces that are relevant for curation and prefix assignment in the Bioregistry.
    Therefore, a large number of the resources in this list correspond 1-to-1 with
    prefixes in the Bioregistry, a small number (e.g., Orphanet, CIViC, PharmGKB)
    correspond to multiple prefixes, some have a complicated relationship with many-to-1
    relationships to prefixes (DNA Data Bank of Japan, European Nucleotide Archive),
    and some constitute databases that simply reuse other key vocabularies (e.g.,
    STRING reuses UniProt, GWAS Catalog reuses dbSNP and EFO). Among the databases
    that don''t induce semantic spaces or have simple relationships to prefixes are:


    - [Clinical Genome Resource](https://www.clinicalgenome.org/) (uses HGNC, MONDO,
    PharmGKB, etc.)

    - [DNA Data Bank of Japan](https://www.ddbj.nig.ac.jp/) (uses INSDC)

    - [GENCODE](https://www.gencodegenes.org/) (uses GenBank)

    - [GWAS Catalog](https://www.ebi.ac.uk/gwas/) (uses dbSNP, EFO, etc)

    - [STRING](https://string-db.org/) (uses UniProt)'
  identifier: '0000010'
  name: Global Biodata Coalition - Global Core Biodata Resources
  resources:
